networks:
  media-network:
    driver: bridge

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.4.182:3000,192.168.4.182:5000
    ports:
      - 3000:3000
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    restart: unless-stopped
    networks:
      - media-network

  samba:
    image: dperson/samba
    container_name: samba
    environment:
      - TZ=${TZ}
      - USER=pi;${DB_PASSWORD}
    volumes:
      - ./data:/home/pi/media-stack/data
    ports:
      - "139:139"
      - "445:445"
    command: -s "HomeServer;/home/pi/media-stack/data;yes;no;no;pi;pi;pi" -u "pi;${DB_PASSWORD}"
    restart: unless-stopped
    networks:
      - media-network

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - 1337:80
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/media/audiobooks:/audiobooks
      - ./data/media/podcasts:/podcasts
      - ./config/audiobookshelf:/config
      - ./config/audiobookshelf/metadata:/metadata
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - media-network

  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/kavita:/config        # Note: linuxserver uses /config, not /kavita/config
      - ./data/media/books:/books
      - ./data/media/comics:/comics
    ports:
      - 5000:5000
    restart: unless-stopped
    networks:
      - media-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: audiobookshelf
    volumes:
      - ./config/postgres:/var/lib/postgresql/data
      - ./config/postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - media-network

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ./config/qbittorrent:/config
      - ./data/downloads:/downloads
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
    networks:
      - media-network

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ./data:/data
    ports:
      - 8989:8989
    restart: unless-stopped
    depends_on:
      - qbittorrent
    networks:
      - media-network

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ./data:/data
    ports:
      - 7878:7878
    restart: unless-stopped
    depends_on:
      - qbittorrent
    networks:
      - media-network

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - media-network
